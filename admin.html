<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISC 密碼管理後台</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f4f6fb;
  --card: #ffffff;
  --text: #1a1a2e;
  --muted: #8892a4;
  --border: #e2e8f0;
  --accent: #667eea;
  --danger: #E74C3C;
  --success: #27AE60;
  --radius: 14px;
}

body {
  background: var(--bg);
  font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  color: var(--text);
  min-height: 100vh;
}

.topbar {
  background: linear-gradient(135deg, #1a1a2e, #0f3460);
  color: white;
  padding: 18px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topbar-title { font-size: 17px; font-weight: 800; }
.topbar-sub { font-size: 12px; opacity: 0.55; margin-top: 2px; }

.container { max-width: 720px; margin: 32px auto; padding: 0 20px 60px; }

/* ── Setup card ── */
.setup-card, .main-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 28px;
  margin-bottom: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.04);
}

.card-title {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 4px;
}
.card-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 20px;
  line-height: 1.6;
}

label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 6px;
  margin-top: 14px;
}
label:first-of-type { margin-top: 0; }

input[type="text"], input[type="password"], input[type="date"] {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  background: white;
}
input:focus { border-color: var(--accent); }

/* ── Buttons ── */
.btn {
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  padding: 10px 22px;
  cursor: pointer;
  transition: transform 0.12s, opacity 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { transform: translateY(-1px); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-primary { background: linear-gradient(135deg,#667eea,#764ba2); color:white; box-shadow:0 3px 12px rgba(102,126,234,0.35); }
.btn-success { background: var(--success); color:white; }
.btn-danger  { background: var(--danger);  color:white; font-size: 12px; padding: 6px 14px; }
.btn-outline { background: white; border: 1.5px solid var(--border); color: var(--text); }

/* ── Status banner ── */
.status-banner {
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 20px;
  display: none;
}
.status-banner.info    { background:#eef2ff; color:#4f46e5; border:1px solid #c7d2fe; }
.status-banner.success { background:#ecfdf5; color:#065f46; border:1px solid #6ee7b7; }
.status-banner.error   { background:#fef2f2; color:#991b1b; border:1px solid #fca5a5; }
.status-banner.show    { display: block; }

/* ── Password table ── */
.pw-list { list-style: none; }

.pw-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.pw-item:last-child { border-bottom: none; }

.pw-badge {
  background: #1a1a2e;
  color: white;
  font-family: monospace;
  font-size: 14px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 8px;
  letter-spacing: 1px;
  min-width: 110px;
  text-align: center;
}

.pw-info { flex: 1; }
.pw-label { font-size: 14px; font-weight: 600; }
.pw-expiry { font-size: 12px; color: var(--muted); margin-top: 2px; }

.pw-status {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 99px;
}
.pw-status.valid   { background: #ecfdf5; color: #065f46; }
.pw-status.expired { background: #fef2f2; color: #991b1b; }

.pw-empty {
  text-align: center;
  color: var(--muted);
  padding: 28px 0;
  font-size: 14px;
}

/* ── Add form ── */
.add-form {
  background: #f8f9ff;
  border: 1.5px dashed #c7d2fe;
  border-radius: 12px;
  padding: 20px;
  margin-top: 20px;
}
.add-form-title {
  font-size: 14px;
  font-weight: 800;
  margin-bottom: 14px;
  color: var(--accent);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.add-form-actions { display: flex; gap: 10px; margin-top: 14px; }

/* ── Steps ── */
.step-badge {
  display: inline-flex;
  width: 22px;
  height: 22px;
  background: var(--accent);
  color: white;
  border-radius: 50%;
  font-size: 12px;
  font-weight: 800;
  align-items: center;
  justify-content: center;
  margin-right: 6px;
  flex-shrink: 0;
}

.help-link {
  color: var(--accent);
  text-decoration: none;
  font-size: 13px;
}
.help-link:hover { text-decoration: underline; }

.section-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 22px 0;
}

.loading-spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 480px) {
  .form-row { grid-template-columns: 1fr; }
  .pw-badge { min-width: 80px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">⚙️ DISC 密碼管理後台</div>
    <div class="topbar-sub">psyboyhuang-sys / DiSC-for-Daniel</div>
  </div>
  <a href="index.html" style="color:rgba(255,255,255,0.5);font-size:13px;text-decoration:none;">← 回到問卷</a>
</div>

<div class="container">

  <!-- Status Banner -->
  <div class="status-banner" id="status-banner"></div>

  <!-- Step 1: GitHub Token -->
  <div class="setup-card" id="token-card">
    <div class="card-title"><span class="step-badge">1</span>連接 GitHub 帳號</div>
    <div class="card-sub">
      需要 GitHub Personal Access Token 才能直接在此頁面更新密碼設定，無需手動編輯程式碼。<br>
      Token 只儲存在您的瀏覽器中，不會上傳到任何地方。<br><br>
      <a class="help-link" href="https://github.com/settings/tokens/new?description=DISC-Survey&scopes=repo" target="_blank">
        🔗 點此前往 GitHub 建立 Token（勾選 repo 權限）
      </a>
    </div>

    <label>GitHub Personal Access Token</label>
    <div style="display:flex;gap:10px;align-items:center;">
      <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxx"
             style="flex:1;" autocomplete="off">
      <button class="btn btn-primary" onclick="connectGitHub()">連線</button>
    </div>
    <div style="margin-top:10px;">
      <label style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin:0;cursor:pointer;">
        <input type="checkbox" id="remember-token"> 記住 Token（下次免輸入）
      </label>
    </div>
  </div>

  <!-- Step 2: Manage Passwords -->
  <div class="main-card" id="main-card" style="display:none;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
      <div class="card-title"><span class="step-badge">2</span>密碼管理</div>
      <button class="btn btn-outline" onclick="logout()" style="font-size:12px;padding:7px 14px;">登出</button>
    </div>
    <div class="card-sub">新增或刪除課程密碼，變更儲存後立即生效（GitHub Pages 約 1 分鐘更新）。</div>

    <div class="status-banner" id="save-banner"></div>

    <ul class="pw-list" id="pw-list">
      <li class="pw-empty">載入中…</li>
    </ul>

    <!-- Add form -->
    <div class="add-form">
      <div class="add-form-title">＋ 新增密碼</div>
      <div class="form-row">
        <div>
          <label>密碼字串</label>
          <input type="text" id="new-code" placeholder="例：train0512" autocomplete="off" maxlength="30">
        </div>
        <div>
          <label>有效期限（含當天）</label>
          <input type="date" id="new-expiry">
        </div>
      </div>
      <div>
        <label>備註標籤（選填）</label>
        <input type="text" id="new-label" placeholder="例：5月12日場次" maxlength="30">
      </div>
      <div class="add-form-actions">
        <button class="btn btn-success" onclick="addPassword()">新增</button>
        <button class="btn btn-outline" onclick="clearAddForm()">清除</button>
      </div>
    </div>

    <hr class="section-divider">

    <div style="display:flex;justify-content:flex-end;">
      <button class="btn btn-primary" id="save-btn" onclick="saveToGitHub()">
        💾 儲存至 GitHub
      </button>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-top:8px;text-align:right;">
      儲存後約 1 分鐘，問卷頁密碼驗證即生效
    </div>
  </div>

</div>

<script>
// ════════════════════════════════════
//  Constants
// ════════════════════════════════════
const OWNER = 'psyboyhuang-sys';
const REPO  = 'DiSC-for-Daniel';
const FILE  = 'config.js';
const API   = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;

let ghToken  = '';
let fileSHA  = '';     // current file SHA (needed for PUT)
let passwords = [];    // working copy

// ════════════════════════════════════
//  Init
// ════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  // Pre-fill saved token
  const saved = localStorage.getItem('disc_gh_token');
  if (saved) {
    document.getElementById('token-input').value = saved;
    document.getElementById('remember-token').checked = true;
  }

  // Default expiry = today + 7 days
  const d = new Date();
  d.setDate(d.getDate() + 7);
  document.getElementById('new-expiry').value = d.toISOString().slice(0, 10);
});

// ════════════════════════════════════
//  Connect GitHub
// ════════════════════════════════════
async function connectGitHub() {
  const token = document.getElementById('token-input').value.trim();
  if (!token) { showStatus('請輸入 Token', 'error'); return; }

  ghToken = token;
  if (document.getElementById('remember-token').checked) {
    localStorage.setItem('disc_gh_token', token);
  } else {
    localStorage.removeItem('disc_gh_token');
  }

  showStatus('🔄 連線中，讀取密碼設定…', 'info');

  try {
    const data = await fetchConfig();
    fileSHA = data.sha;
    // atob() 只認 ASCII，中文需先用 escape/decodeURIComponent 還原 UTF-8
    passwords = parsePasswords(decodeURIComponent(escape(atob(data.content.replace(/\n/g, '')))));
    renderPasswordList();
    document.getElementById('token-card').style.display = 'none';
    document.getElementById('main-card').style.display = 'block';
    clearStatus();
  } catch (err) {
    showStatus('連線失敗：' + err.message, 'error');
    ghToken = '';
  }
}

function logout() {
  ghToken = ''; fileSHA = ''; passwords = [];
  document.getElementById('token-card').style.display = 'block';
  document.getElementById('main-card').style.display = 'none';
  clearStatus();
}

// ════════════════════════════════════
//  GitHub API helpers
// ════════════════════════════════════
async function fetchConfig() {
  const res = await fetch(API, {
    headers: {
      'Authorization': `token ${ghToken}`,
      'Accept': 'application/vnd.github.v3+json',
    }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  return res.json();
}

function parsePasswords(jsContent) {
  try {
    const match = jsContent.match(/DISC_CONFIG\s*=\s*(\{[\s\S]*?\});/);
    if (!match) return [];
    const obj = JSON.parse(match[1]);
    return Array.isArray(obj.passwords) ? obj.passwords : [];
  } catch { return []; }
}

function buildConfigContent(pws) {
  const json = JSON.stringify({ passwords: pws });
  return `// DISC Survey Password Configuration\n// ⚠️ 請使用 admin.html 管理密碼，勿手動修改此檔案\nconst DISC_CONFIG = ${json};\n`;
}

// ════════════════════════════════════
//  Render password list
// ════════════════════════════════════
function renderPasswordList() {
  const ul = document.getElementById('pw-list');
  ul.innerHTML = '';

  if (passwords.length === 0) {
    ul.innerHTML = '<li class="pw-empty">尚無任何密碼，請在下方新增。</li>';
    return;
  }

  const today = new Date().toISOString().slice(0, 10);

  passwords.forEach((pw, idx) => {
    const isValid = pw.expiry >= today;
    const daysLeft = Math.ceil((new Date(pw.expiry) - new Date(today)) / 86400000);
    const li = document.createElement('li');
    li.className = 'pw-item';
    li.innerHTML = `
      <div class="pw-badge">${escapeHtml(pw.code)}</div>
      <div class="pw-info">
        <div class="pw-label">${escapeHtml(pw.label || '(無備註)')}</div>
        <div class="pw-expiry">有效期限：${pw.expiry}${isValid ? `（還剩 ${daysLeft} 天）` : '（已過期）'}</div>
      </div>
      <span class="pw-status ${isValid ? 'valid' : 'expired'}">${isValid ? '✓ 有效' : '✗ 過期'}</span>
      <button class="btn btn-danger" onclick="removePassword(${idx})">刪除</button>
    `;
    ul.appendChild(li);
  });
}

// ════════════════════════════════════
//  CRUD
// ════════════════════════════════════
function addPassword() {
  const code   = document.getElementById('new-code').value.trim();
  const expiry = document.getElementById('new-expiry').value;
  const label  = document.getElementById('new-label').value.trim();

  if (!code)   { showSaveBanner('請輸入密碼字串', 'error'); return; }
  if (!expiry) { showSaveBanner('請選擇有效期限', 'error'); return; }
  if (passwords.find(p => p.code === code)) {
    showSaveBanner(`密碼「${code}」已存在`, 'error'); return;
  }

  passwords.push({ code, expiry, label });
  renderPasswordList();
  clearAddForm();
  showSaveBanner('已新增，記得按「儲存至 GitHub」以套用', 'info');
}

function removePassword(idx) {
  const pw = passwords[idx];
  if (!confirm(`確定要刪除密碼「${pw.code}」？`)) return;
  passwords.splice(idx, 1);
  renderPasswordList();
  showSaveBanner('已刪除，記得按「儲存至 GitHub」以套用', 'info');
}

function clearAddForm() {
  document.getElementById('new-code').value = '';
  document.getElementById('new-label').value = '';
  const d = new Date(); d.setDate(d.getDate()+7);
  document.getElementById('new-expiry').value = d.toISOString().slice(0,10);
}

// ════════════════════════════════════
//  Save to GitHub
// ════════════════════════════════════
async function saveToGitHub() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span> 儲存中…';
  clearStatus();

  const newContent = buildConfigContent(passwords);
  const encoded = btoa(unescape(encodeURIComponent(newContent)));

  try {
    const body = {
      message: `Update DISC passwords (${new Date().toLocaleDateString('zh-TW')})`,
      content: encoded,
      sha: fileSHA,
    };

    const res = await fetch(API, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${ghToken}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    fileSHA = data.content.sha; // update SHA for next save

    showSaveBanner('✅ 已成功儲存到 GitHub！約 1 分鐘後問卷頁生效。', 'success');
    showStatus('✅ 密碼設定已更新', 'success');

  } catch (err) {
    showSaveBanner('❌ 儲存失敗：' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '💾 儲存至 GitHub';
  }
}

// ════════════════════════════════════
//  UI helpers
// ════════════════════════════════════
function showStatus(msg, type) {
  const el = document.getElementById('status-banner');
  el.textContent = msg;
  el.className = `status-banner ${type} show`;
}
function clearStatus() {
  document.getElementById('status-banner').className = 'status-banner';
}
function showSaveBanner(msg, type) {
  const el = document.getElementById('save-banner');
  el.textContent = msg;
  el.className = `status-banner ${type} show`;
  setTimeout(() => el.className = 'status-banner', 5000);
}
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
