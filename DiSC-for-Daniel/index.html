<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISC 個性問卷</title>
<script src="config.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    padding: 20px;
  }

  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 440px;
    text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }

  .disc-logo {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 32px;
  }

  .disc-letter {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 900;
    color: white;
    letter-spacing: 0;
  }
  .disc-letter.d { background: #E74C3C; }
  .disc-letter.i { background: #F39C12; }
  .disc-letter.s { background: #27AE60; }
  .disc-letter.c { background: #2980B9; }

  h1 {
    color: white;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .subtitle {
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    margin-bottom: 36px;
    line-height: 1.6;
  }

  .input-group {
    position: relative;
    margin-bottom: 16px;
  }

  .input-group input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    color: white;
    font-size: 16px;
    padding: 14px 48px 14px 18px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    letter-spacing: 2px;
  }

  .input-group input::placeholder {
    color: rgba(255,255,255,0.3);
    letter-spacing: 0;
  }

  .input-group input:focus {
    border-color: rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.12);
  }

  .toggle-pw {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.4);
    font-size: 18px;
    padding: 4px;
    line-height: 1;
    transition: color 0.2s;
  }
  .toggle-pw:hover { color: rgba(255,255,255,0.7); }

  .error-msg {
    color: #ff6b6b;
    font-size: 13px;
    margin-bottom: 12px;
    min-height: 20px;
    transition: opacity 0.3s;
  }

  .btn-enter {
    width: 100%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    box-shadow: 0 4px 20px rgba(102,126,234,0.4);
  }

  .btn-enter:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(102,126,234,0.5); }
  .btn-enter:active { transform: translateY(0); }
  .btn-enter:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .footer-note {
    margin-top: 28px;
    color: rgba(255,255,255,0.25);
    font-size: 12px;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  .shake { animation: shake 0.4s ease; }
</style>
</head>
<body>
<div class="card">
  <div class="disc-logo">
    <div class="disc-letter d">D</div>
    <div class="disc-letter i">I</div>
    <div class="disc-letter s">S</div>
    <div class="disc-letter c">C</div>
  </div>

  <h1>個性人際關係建立模式</h1>
  <p class="subtitle">請輸入課程密碼以進入問卷<br>密碼由講師提供</p>

  <div class="input-group">
    <input type="password" id="pw-input" placeholder="輸入課程密碼" autocomplete="off" autofocus>
    <button class="toggle-pw" id="toggle-btn" title="顯示/隱藏密碼">👁</button>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <button class="btn-enter" id="enter-btn" onclick="checkPassword()">進入問卷 →</button>

  <p class="footer-note">密碼具有時效性，如已過期請洽講師</p>
</div>

<script>
  // 切換密碼顯示
  document.getElementById('toggle-btn').addEventListener('click', () => {
    const inp = document.getElementById('pw-input');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });

  // Enter 鍵觸發
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPassword();
  });

  function checkPassword() {
    const input = document.getElementById('pw-input').value.trim();
    const errorEl = document.getElementById('error-msg');
    const btn = document.getElementById('enter-btn');

    if (!input) {
      showError('請輸入密碼');
      return;
    }

    btn.disabled = true;
    btn.textContent = '驗證中…';

    // 稍微延遲，避免暴力測試
    setTimeout(() => {
      const today = new Date().toISOString().slice(0, 10);
      const passwords = (typeof DISC_CONFIG !== 'undefined') ? DISC_CONFIG.passwords : [];
      const match = passwords.find(p => p.code === input && p.expiry >= today);

      if (match) {
        sessionStorage.setItem('disc_auth', 'ok');
        sessionStorage.setItem('disc_label', match.label || '');
        errorEl.textContent = '';
        btn.textContent = '✓ 驗證成功，跳轉中…';
        btn.style.background = 'linear-gradient(135deg, #27AE60, #1e8449)';
        setTimeout(() => { window.location.href = 'survey.html'; }, 600);
      } else {
        showError(passwords.find(p => p.code === input) ? '此密碼已過期，請洽講師' : '密碼錯誤，請重新輸入');
        btn.disabled = false;
        btn.textContent = '進入問卷 →';
        document.getElementById('pw-input').classList.add('shake');
        setTimeout(() => document.getElementById('pw-input').classList.remove('shake'), 500);
      }
    }, 600);
  }

  function showError(msg) {
    document.getElementById('error-msg').textContent = msg;
  }
</script>
</body>
</html>
