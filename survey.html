<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISC 行事風格評量</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --d: #E74C3C;
  --i: #F39C12;
  --s: #27AE60;
  --c: #2980B9;
  --bg: #f4f6fb;
  --card: #ffffff;
  --text: #1a1a2e;
  --muted: #8892a4;
  --border: #e2e8f0;
  --accent: #667eea;
  --radius: 14px;
}

body {
  background: var(--bg);
  font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
  color: white;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}
.header-title { font-size: 15px; font-weight: 700; }
.header-sub   { font-size: 11px; opacity: 0.55; margin-top: 2px; }

.progress-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 110px; }
.progress-text { font-size: 12px; opacity: 0.7; }
.progress-bar-outer { width: 110px; height: 6px; background: rgba(255,255,255,0.18); border-radius: 99px; overflow: hidden; }
.progress-bar-inner { height: 100%; background: linear-gradient(90deg,#667eea,#a78bfa); border-radius: 99px; transition: width 0.4s ease; width: 0%; }

/* ── Container ── */
.container { max-width: 680px; margin: 0 auto; padding: 0 14px 60px; }

/* ── Scene card ── */
.scene-card {
  background: linear-gradient(135deg, #eef2ff, #f5f0ff);
  border: 1.5px solid #c7d2fe;
  border-radius: var(--radius);
  padding: 20px 22px;
  margin: 20px 0 10px;
}
.scene-card-title {
  font-size: 15px;
  font-weight: 800;
  color: #4338ca;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.scene-card-desc {
  font-size: 14px;
  color: #555;
  line-height: 1.7;
  margin-bottom: 14px;
}
.scene-examples {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
  margin-bottom: 14px;
}
.scene-example-chip {
  background: white;
  border: 1.5px solid #c7d2fe;
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 13px;
  font-weight: 600;
  color: #4338ca;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.scene-example-chip:hover, .scene-example-chip.selected {
  background: #4338ca;
  color: white;
  border-color: #4338ca;
}
.scene-input-wrap { position: relative; }
.scene-input-label {
  font-size: 12px;
  font-weight: 700;
  color: #6366f1;
  margin-bottom: 6px;
}
.scene-input {
  width: 100%;
  border: 1.5px solid #c7d2fe;
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 15px;
  color: var(--text);
  background: white;
  outline: none;
  transition: border-color 0.2s;
  font-family: inherit;
}
.scene-input:focus { border-color: #6366f1; }
.scene-input.error { border-color: #E74C3C; background: #fff5f5; }
.scene-input-hint {
  font-size: 12px;
  color: #E74C3C;
  margin-top: 5px;
  min-height: 18px;
}

/* ── Instructions ── */
.instructions {
  background: white;
  border-left: 4px solid var(--accent);
  margin: 10px 0 14px;
  padding: 16px 20px;
  border-radius: 0 10px 10px 0;
  font-size: 15px;
  color: #444;
  line-height: 1.8;
}
.instructions strong { color: var(--text); }

/* ── Question card ── */
.q-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  margin-bottom: 10px;
  padding: 16px;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.q-card.complete {
  border-color: var(--s);
  box-shadow: 0 0 0 1px rgba(39,174,96,0.12);
}

.q-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.q-num    { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.3px; }
.q-right  { display: flex; align-items: center; gap: 10px; }
.q-status { font-size: 12px; color: var(--muted); transition: color 0.3s; }
.q-card.complete .q-status { color: var(--s); font-weight: 700; }

.btn-reset {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 11px;
  padding: 3px 10px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.btn-reset:hover { border-color: #aaa; color: var(--text); }

/* ── Slots（兩列 grid：標籤列 + 格子列） ── */
.slots-area {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: auto auto;
  gap: 6px 8px;
  margin-bottom: 10px;
}
.slot-label {
  font-size: 12px;
  font-weight: 800;
  color: var(--muted);
  text-align: center;
  line-height: 1.3;
  height: 34px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 2px;
}
.slot-label.first { color: #764ba2; }
.slot-label.last  { color: #bbb; }
.slot-label span  { font-size: 10px; font-weight: 500; display: block; }

.slot {
  width: 100%;
  min-height: 52px;
  border-radius: 10px;
  border: 2px dashed #d1d9e8;
  background: #f8f9ff;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.slot.filled {
  border: 2px solid var(--accent);
  background: linear-gradient(135deg,#667eea12,#764ba210);
  cursor: pointer;
}
.slot.filled:hover { border-color: #E74C3C; background: #fff0f0; }
.slot.filled:hover::after {
  content: '×';
  position: absolute; top: 3px; right: 6px;
  font-size: 13px; color: #E74C3C; font-weight: 900; line-height: 1;
}
.chip-placed {
  font-size: 13px; font-weight: 700; color: var(--text);
  text-align: center; line-height: 1.3; padding: 4px;
  pointer-events: none; user-select: none;
}

/* ── Pool ── */
.pool-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
.pool { display: flex; flex-wrap: wrap; gap: 8px; min-height: 44px; }
.chip-pool {
  background: linear-gradient(135deg,#667eea18,#764ba212);
  border: 1.5px solid #667eea50;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px; font-weight: 700; color: var(--text);
  cursor: pointer; user-select: none;
  transition: transform 0.12s, box-shadow 0.12s, background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.chip-pool:hover, .chip-pool:active {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 4px 14px rgba(102,126,234,0.28);
  border-color: var(--accent);
  background: linear-gradient(135deg,#667eea28,#764ba220);
}
.pool-empty-hint { font-size: 12px; color: #aaa; font-style: italic; align-self: center; }

/* ── Submit ── */
.submit-wrap { text-align: center; margin-top: 28px; }
.btn-submit {
  background: linear-gradient(135deg,#667eea,#764ba2);
  color: white; border: none; border-radius: 14px;
  font-size: 16px; font-weight: 700; padding: 15px 44px; cursor: pointer;
  box-shadow: 0 6px 24px rgba(102,126,234,0.4);
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
  touch-action: manipulation;
}
.btn-submit:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(102,126,234,0.5); }
.btn-submit:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.incomplete-note { color: var(--d); font-size: 13px; margin-top: 10px; min-height: 20px; }

/* ── Results overlay ── */
.results-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(15,25,50,0.92);
  z-index: 200; overflow-y: auto;
  padding: 32px 16px; backdrop-filter: blur(8px);
}
.results-overlay.show { display: flex; align-items: flex-start; justify-content: center; }
.results-box {
  background: white; border-radius: 24px;
  padding: 32px 28px; width: 100%; max-width: 540px;
  margin: auto; text-align: center;
}
.results-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.results-scene-tag {
  display: inline-block;
  background: #eef2ff; color: #4338ca;
  border: 1px solid #c7d2fe;
  border-radius: 20px; font-size: 13px; font-weight: 600;
  padding: 4px 14px; margin-bottom: 20px;
}

/* 2×2 順時針方塊 grid */
.score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.score-block {
  border-radius: 16px; padding: 18px 12px;
  color: white; position: relative; overflow: hidden;
}
.score-block.dominant::after {
  content: '★ 最高';
  position: absolute; top: 8px; right: 9px;
  font-size: 10px; font-weight: 700;
  background: rgba(255,255,255,0.25);
  border-radius: 99px; padding: 2px 7px;
}
.score-block .type-letter { font-size: 38px; font-weight: 900; line-height: 1; }
.score-block .type-name   { font-size: 12px; font-weight: 600; opacity: 0.85; margin: 3px 0 10px; }
.score-block .type-score  { font-size: 40px; font-weight: 900; line-height: 1; }
.score-block .type-traits { font-size: 11px; opacity: 0.8; margin-top: 10px; line-height: 1.5; }

/* 長條圖 */
.bar-chart { margin: 4px 0 24px; }
.bar-row   { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-label { width: 22px; font-weight: 800; font-size: 14px; text-align: right; flex-shrink: 0; }
.bar-track { flex: 1; background: #f0f0f0; border-radius: 99px; height: 14px; overflow: hidden; }
.bar-fill  { height: 100%; border-radius: 99px; transition: width 1s ease; }
.bar-val   { width: 26px; font-size: 13px; font-weight: 700; text-align: left; flex-shrink: 0; }

.btn-download {
  background: linear-gradient(135deg,#667eea,#764ba2);
  color: white; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 700; padding: 13px 32px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(102,126,234,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
  margin-bottom: 12px; touch-action: manipulation;
}
.btn-download:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(102,126,234,0.5); }
.btn-redo {
  display: block; margin: 0 auto;
  background: none; border: 1.5px solid #ddd;
  color: var(--muted); border-radius: 10px;
  font-size: 13px; padding: 8px 20px; cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.btn-redo:hover { border-color: #aaa; color: var(--text); }

@media (max-width: 440px) {
  .chip-placed { font-size: 11px; }
  .chip-pool   { font-size: 12px; padding: 9px 11px; }
  .slot-label  { font-size: 10px; }
  .results-box { padding: 22px 16px; }
  .score-block .type-letter { font-size: 30px; }
  .score-block .type-score  { font-size: 32px; }
}
</style>
</head>
<body>

<script>if (!sessionStorage.getItem('disc_auth')) window.location.href = 'index.html';</script>

<!-- Header -->
<div class="header">
  <div>
    <div class="header-title">行事風格評量</div>
    <div class="header-sub">Relational Style Assessment</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-text" id="progress-text">0 / 12 完成</div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progress-bar"></div>
    </div>
  </div>
</div>

<div class="container">

  <!-- 場景設定卡 -->
  <div class="scene-card">
    <div class="scene-card-title">🎯 請先設定您的場景</div>
    <div class="scene-card-desc">
      每個人在不同情境下的行事風格可能不同。請先在腦海中<strong>鎖定一個具體場景</strong>，整份評量都要根據這個場景來作答。
    </div>
    <div class="scene-examples" id="scene-examples">
      <div class="scene-example-chip" onclick="selectScene(this,'工作職場')">工作職場</div>
      <div class="scene-example-chip" onclick="selectScene(this,'朋友相處')">朋友相處</div>
      <div class="scene-example-chip" onclick="selectScene(this,'家人互動')">家人互動</div>
      <div class="scene-example-chip" onclick="selectScene(this,'伴侶關係')">伴侶關係</div>
      <div class="scene-example-chip" onclick="selectScene(this,'自我認識')">自我認識</div>
    </div>
    <div class="scene-input-label">您的場景（必填）：</div>
    <div class="scene-input-wrap">
      <input type="text" class="scene-input" id="scene-input"
             placeholder="例：在公司帶領團隊時" maxlength="40"
             oninput="clearSceneError()">
    </div>
    <div class="scene-input-hint" id="scene-hint"></div>
  </div>

  <!-- 作答說明 -->
  <div class="instructions">
    <strong>作答說明：</strong>請依照您在上述場景中的<strong>直覺反應</strong>作答，沒有對或錯。<br>
    每題有 4 個詞，<strong>依序點選</strong>放入分數格——第一個點的最符合您（4分），最後點的最不符合（1分）。點已放入的詞可取消。
  </div>

  <div id="questions-container"></div>

  <div class="submit-wrap">
    <button class="btn-submit" id="submit-btn" onclick="submitSurvey()">查看結果 →</button>
    <div class="incomplete-note" id="incomplete-note"></div>
  </div>
</div>

<!-- Results Overlay -->
<div class="results-overlay" id="results-overlay">
  <div class="results-box">
    <div class="results-title">我的行事風格結果</div>
    <div class="results-scene-tag" id="results-scene-tag"></div>
    <!-- 順時針 2×2：D(左上) I(右上) C(左下) S(右下) -->
    <div class="score-grid" id="score-grid"></div>
    <div class="bar-chart" id="bar-chart"></div>
    <button class="btn-download" onclick="downloadImage()">⬇ 下載結果圖片</button>
    <button class="btn-redo" onclick="location.reload()">重新作答</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  題目資料（12列 × 4欄：D, I, S, C）
// ══════════════════════════════════════════
const QUESTIONS = [
  { D:'強力的',     I:'朝氣蓬勃的', S:'中庸的',     C:'老練的'     },
  { D:'積極的',     I:'情緒化的',   S:'隨和的',     C:'一致的'     },
  { D:'直接了當的', I:'表情豐富的', S:'和藹可親的', C:'精確的'     },
  { D:'堅韌的',     I:'以人為本的', S:'溫和的',     C:'完美主義者' },
  { D:'膽大的',     I:'衝動的',     S:'親切的',     C:'謹慎的'     },
  { D:'競爭的',     I:'情感豐富的', S:'支持的',     C:'準確的'     },
  { D:'冒險者',     I:'健談的',     S:'輕鬆的',     C:'確實的'     },
  { D:'好議論的',   I:'喜愛有趣的', S:'耐心的',     C:'邏輯的'     },
  { D:'勇敢的',     I:'不做作的',   S:'穩定的',     C:'組織性的'   },
  { D:'負責',       I:'樂觀的',     S:'溫和的',     C:'周全的'     },
  { D:'率直的',     I:'興高采烈的', S:'忠心的',     C:'嚴肅的'     },
  { D:'獨立的',     I:'狂熱的',     S:'好的傾聽者', C:'高標準'     },
];

const TYPE_META = {
  D: { name:'主導型', color:'#E74C3C', traits:'果決・目標導向\n直接・喜歡掌控' },
  I: { name:'影響型', color:'#F39C12', traits:'熱情・樂觀\n善溝通・有感染力' },
  S: { name:'穩健型', color:'#27AE60', traits:'耐心・可靠\n善傾聽・重視關係' },
  C: { name:'謹慎型', color:'#2980B9', traits:'精確・分析\n高標準・系統思考' },
};

const TYPES = ['D','I','S','C'];

// 順時針排列順序（結果頁 2×2 grid）：D(左上) I(右上) C(左下) S(右下)
const GRID_ORDER = ['D','I','C','S'];

// 長條圖固定順序
const BAR_ORDER = ['D','I','S','C'];

// ══════════════════════════════════════════
//  場景選擇
// ══════════════════════════════════════════
function selectScene(chip, text) {
  document.querySelectorAll('.scene-example-chip').forEach(c => c.classList.remove('selected'));
  chip.classList.add('selected');
  document.getElementById('scene-input').value = text;
  clearSceneError();
}

function clearSceneError() {
  document.getElementById('scene-input').classList.remove('error');
  document.getElementById('scene-hint').textContent = '';
}

function getScene() {
  return document.getElementById('scene-input').value.trim();
}

// ══════════════════════════════════════════
//  題目狀態
// ══════════════════════════════════════════
const rowState = QUESTIONS.map(() => ({ slots: [null, null, null, null] }));
const rowOrder = QUESTIONS.map(() => shuffle([...TYPES]));

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ══════════════════════════════════════════
//  建立題目 HTML
// ══════════════════════════════════════════
const container = document.getElementById('questions-container');

QUESTIONS.forEach((_, rowIdx) => {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = `card-${rowIdx}`;
  card.innerHTML = `
    <div class="q-header">
      <span class="q-num">第 ${rowIdx + 1} 題</span>
      <div class="q-right">
        <span class="q-status" id="status-${rowIdx}">點選詞語放入分數格</span>
        <button class="btn-reset" onclick="resetRow(${rowIdx})">重設</button>
      </div>
    </div>
    <div class="slots-area" id="slots-${rowIdx}">
      <div class="slot-label first">4<span>最符合</span></div>
      <div class="slot-label">3</div>
      <div class="slot-label">2</div>
      <div class="slot-label last">1<span>最不符合</span></div>
      <div class="slot" id="slot-${rowIdx}-0" onclick="slotClick(${rowIdx},0)"></div>
      <div class="slot" id="slot-${rowIdx}-1" onclick="slotClick(${rowIdx},1)"></div>
      <div class="slot" id="slot-${rowIdx}-2" onclick="slotClick(${rowIdx},2)"></div>
      <div class="slot" id="slot-${rowIdx}-3" onclick="slotClick(${rowIdx},3)"></div>
    </div>
    <div class="pool-label">待選詞：</div>
    <div class="pool" id="pool-${rowIdx}"></div>
  `;
  container.appendChild(card);
});

QUESTIONS.forEach((_, i) => renderRow(i));

// ══════════════════════════════════════════
//  操作函式
// ══════════════════════════════════════════
function placeChip(rowIdx, type) {
  const slots = rowState[rowIdx].slots;
  const nextEmpty = slots.findIndex(s => s === null);
  if (nextEmpty === -1) return;
  slots[nextEmpty] = type;
  renderRow(rowIdx);
  updateProgress();
}

function slotClick(rowIdx, pos) {
  if (!rowState[rowIdx].slots[pos]) return;
  rowState[rowIdx].slots[pos] = null;
  renderRow(rowIdx);
  updateProgress();
}

function resetRow(rowIdx) {
  rowState[rowIdx].slots = [null, null, null, null];
  renderRow(rowIdx);
  updateProgress();
}

// ══════════════════════════════════════════
//  渲染單列
// ══════════════════════════════════════════
function renderRow(rowIdx) {
  const q      = QUESTIONS[rowIdx];
  const slots  = rowState[rowIdx].slots;
  const placed = new Set(slots.filter(Boolean));
  const isComplete = placed.size === 4;

  document.getElementById(`card-${rowIdx}`).className = 'q-card' + (isComplete ? ' complete' : '');

  const remaining = 4 - placed.size;
  document.getElementById(`status-${rowIdx}`).textContent =
    isComplete ? '✓ 完成' : `還剩 ${remaining} 個詞`;

  for (let pos = 0; pos < 4; pos++) {
    const slotEl = document.getElementById(`slot-${rowIdx}-${pos}`);
    const type   = slots[pos];
    if (type) {
      slotEl.className = 'slot filled';
      slotEl.innerHTML = `<div class="chip-placed">${q[type]}</div>`;
    } else {
      slotEl.className = 'slot';
      slotEl.innerHTML = '';
    }
  }

  const poolEl    = document.getElementById(`pool-${rowIdx}`);
  const poolTypes = rowOrder[rowIdx].filter(t => !placed.has(t));
  poolEl.innerHTML = poolTypes.length === 0
    ? '<span class="pool-empty-hint">所有詞已放入，點分數格可取消</span>'
    : poolTypes.map(type =>
        `<div class="chip-pool" onclick="placeChip(${rowIdx},'${type}')">${q[type]}</div>`
      ).join('');
}

// ══════════════════════════════════════════
//  進度條
// ══════════════════════════════════════════
function updateProgress() {
  const done = rowState.filter(r => r.slots.every(s => s !== null)).length;
  document.getElementById('progress-text').textContent = `${done} / 12 完成`;
  document.getElementById('progress-bar').style.width = `${(done / 12) * 100}%`;
}

// ══════════════════════════════════════════
//  計分（pos 0=4分 … pos 3=1分）
// ══════════════════════════════════════════
function calculateScores() {
  const scores = { D:0, I:0, S:0, C:0 };
  rowState.forEach(row => {
    row.slots.forEach((type, pos) => {
      if (type) scores[type] += (4 - pos);
    });
  });
  return scores;
}

// ══════════════════════════════════════════
//  提交
// ══════════════════════════════════════════
function submitSurvey() {
  // 驗證場景（必填）
  const scene = getScene();
  if (!scene) {
    document.getElementById('scene-input').classList.add('error');
    document.getElementById('scene-hint').textContent = '請填寫或選擇場景，再繼續作答';
    document.getElementById('scene-input').scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }

  // 驗證題目完整
  const incomplete = rowState.findIndex(r => r.slots.some(s => s === null));
  if (incomplete !== -1) {
    document.getElementById('incomplete-note').textContent =
      `⚠ 第 ${incomplete + 1} 題尚未完成，請將所有詞放入分數格`;
    document.getElementById(`card-${incomplete}`)
      .scrollIntoView({ behavior:'smooth', block:'center' });
    return;
  }

  const scores = calculateScores();
  const total  = Object.values(scores).reduce((a, b) => a + b, 0);
  if (total !== 120) {
    document.getElementById('incomplete-note').textContent =
      `⚠ 計分異常（總分 ${total}，應為 120），請重新整理頁面。`;
    return;
  }

  document.getElementById('incomplete-note').textContent = '';
  renderResults(scores, scene);
}

// ══════════════════════════════════════════
//  結果頁
//  順時針 2×2 grid：D(左上) I(右上) C(左下) S(右下)
// ══════════════════════════════════════════
function renderResults(scores, scene) {
  const maxScore = Math.max(...TYPES.map(t => scores[t]));

  // 場景標籤
  document.getElementById('results-scene-tag').textContent = '場景：' + scene;

  // 2×2 順時針方塊
  const grid = document.getElementById('score-grid');
  grid.innerHTML = '';
  GRID_ORDER.forEach(type => {
    const meta  = TYPE_META[type];
    const isDom = scores[type] === maxScore;
    const block = document.createElement('div');
    block.className = 'score-block' + (isDom ? ' dominant' : '');
    block.style.background = `linear-gradient(135deg,${meta.color}ee,${meta.color}99)`;
    block.innerHTML = `
      <div class="type-letter">${type}</div>
      <div class="type-name">${meta.name}</div>
      <div class="type-score">${scores[type]}</div>
      <div class="type-traits">${meta.traits}</div>
    `;
    grid.appendChild(block);
  });

  // 長條圖（固定 D I S C 順序）
  const chart = document.getElementById('bar-chart');
  chart.innerHTML = BAR_ORDER.map(type => {
    const meta = TYPE_META[type];
    const pct  = (scores[type] / 48 * 100).toFixed(1);
    return `
      <div class="bar-row">
        <div class="bar-label" style="color:${meta.color}">${type}</div>
        <div class="bar-track">
          <div class="bar-fill" style="background:${meta.color};width:0%" data-pct="${pct}"></div>
        </div>
        <div class="bar-val">${scores[type]}</div>
      </div>`;
  }).join('');

  document.getElementById('results-overlay').classList.add('show');
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(b => { b.style.width = b.dataset.pct + '%'; });
  }, 80);

  window._discScores = scores;
  window._discScene  = scene;
}

// ══════════════════════════════════════════
//  Canvas 結果圖片
//  上排：D I（順時針）
//  下排：C S
// ══════════════════════════════════════════
function downloadImage() {
  const scores = window._discScores;
  const scene  = window._discScene || '';
  if (!scores) return;

  const W = 900, H = 620;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // 背景
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#1a1a2e');
  bgGrad.addColorStop(1, '#0f3460');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // 標題區
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fillRect(0, 0, W, 78);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 25px "PingFang TC","Microsoft JhengHei",Arial';
  ctx.textAlign = 'center';
  ctx.fillText('我的行事風格結果', W / 2, 40);

  // 場景標籤
  const tagW = ctx.measureText('場景：' + scene).width + 32;
  rrect(ctx, W/2 - tagW/2, 48, tagW, 22, 11);
  ctx.fillStyle = 'rgba(99,102,241,0.4)';
  ctx.fill();
  ctx.fillStyle = 'rgba(200,210,255,0.9)';
  ctx.font = '13px "PingFang TC","Microsoft JhengHei",Arial';
  ctx.fillText('場景：' + scene, W / 2, 63);

  // 四個象限（順時針：D左上 I右上 C左下 S右下）
  const colors = { D:'#E74C3C', I:'#F39C12', S:'#27AE60', C:'#2980B9' };
  const names  = { D:'主導型', I:'影響型', S:'穩健型', C:'謹慎型' };
  const traits = {
    D:['果決','目標導向','直接'],
    I:['熱情','樂觀','善溝通'],
    S:['耐心','可靠','善傾聽'],
    C:['精確','分析','高標準'],
  };
  const maxScore = Math.max(...TYPES.map(t => scores[t]));

  // 2×2 排列：[D, I, C, S] → positions [(0,0),(1,0),(0,1),(1,1)]
  const bW = 200, bH = 185, gap = 16;
  const gridW = bW * 2 + gap;
  const startX = (W - gridW) / 2;
  const startY = 90;

  // 順時針：D(col0,row0) I(col1,row0) C(col0,row1) S(col1,row1)
  const positions = { D:[0,0], I:[1,0], C:[0,1], S:[1,1] };

  GRID_ORDER.forEach(type => {
    const [col, row] = positions[type];
    const x = startX + col * (bW + gap);
    const y = startY + row * (bH + gap);
    const isDom = scores[type] === maxScore;

    rrect(ctx, x, y, bW, bH, 14);
    const g = ctx.createLinearGradient(x, y, x + bW, y + bH);
    g.addColorStop(0, colors[type] + 'ee');
    g.addColorStop(1, colors[type] + '88');
    ctx.fillStyle = g; ctx.fill();

    if (isDom) {
      ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 2.5; ctx.stroke();
      rrect(ctx, x + bW - 62, y + 9, 54, 20, 10);
      ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px "PingFang TC","Microsoft JhengHei",Arial';
      ctx.textAlign = 'center';
      ctx.fillText('★ 最高', x + bW - 35, y + 23);
    }

    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = 'bold 66px "Helvetica Neue",Arial';
    ctx.fillText(type, x + bW/2, y + 72);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 66px "Helvetica Neue",Arial';
    ctx.fillText(type, x + bW/2, y + 70);

    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.font = 'bold 13px "PingFang TC","Microsoft JhengHei",Arial';
    ctx.fillText(names[type], x + bW/2, y + 90);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 38px "Helvetica Neue",Arial';
    ctx.fillText(scores[type], x + bW/2, y + 136);

    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.font = '12px "PingFang TC","Microsoft JhengHei",Arial';
    ctx.fillText(traits[type].join(' · '), x + bW/2, y + 168);
  });

  // 長條圖（D I S C 順序）
  const barY = startY + bH * 2 + gap + 22;
  const barH = 16;
  const barX = 68, barW = W - 136;

  BAR_ORDER.forEach((type, i) => {
    const y   = barY + i * (barH + 11);
    const pct = scores[type] / 48;

    rrect(ctx, barX, y, barW, barH, barH / 2);
    ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fill();

    if (pct > 0) {
      rrect(ctx, barX, y, barW * pct, barH, barH / 2);
      ctx.fillStyle = colors[type]; ctx.fill();
    }

    ctx.fillStyle = colors[type];
    ctx.font = 'bold 13px "Helvetica Neue",Arial';
    ctx.textAlign = 'right';
    ctx.fillText(type, barX - 9, y + barH - 2);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px "Helvetica Neue",Arial';
    ctx.textAlign = 'left';
    ctx.fillText(scores[type], barX + barW * pct + 7, y + barH - 2);
  });

  // Footer
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '11px "PingFang TC","Microsoft JhengHei",Arial';
  ctx.textAlign = 'center';
  ctx.fillText('DISC Relational Style Assessment', W / 2, H - 12);

  const dataUrl = canvas.toDataURL('image/png');

  // 偵測 LINE / Instagram 等不支援 <a download> 的內建瀏覽器
  const ua = navigator.userAgent || '';
  const isInAppBrowser = /Line|Instagram|FBAV|MicroMessenger/i.test(ua);

  if (isInAppBrowser) {
    // 在新分頁顯示圖片，引導使用者長按儲存
    const win = window.open('', '_blank');
    if (win) {
      win.document.write(`
        <!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>DISC 結果</title>
        <style>
          body{margin:0;background:#111;display:flex;flex-direction:column;
               align-items:center;justify-content:center;min-height:100vh;padding:16px;}
          img{max-width:100%;border-radius:12px;}
          p{color:#fff;font-size:15px;margin-top:16px;text-align:center;
            font-family:sans-serif;opacity:0.8;line-height:1.6;}
        </style></head><body>
        <img src="${dataUrl}" alt="DISC 結果">
        <p>📱 長按圖片 → 選擇「儲存圖片」即可下載</p>
        </body></html>
      `);
      win.document.close();
    } else {
      alert('請長按下方結果圖片，選擇「儲存圖片」來下載。');
    }
  } else {
    // 一般瀏覽器：直接下載
    const link = document.createElement('a');
    link.download = 'DISC_行事風格結果.png';
    link.href = dataUrl;
    link.click();
  }
}

function rrect(ctx, x, y, w, h, r) {
  if (w <= 0) return;
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}
</script>
