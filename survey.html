<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISC 個性問卷</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --d: #E74C3C;
  --i: #F39C12;
  --s: #27AE60;
  --c: #2980B9;
  --bg: #f4f6fb;
  --card: #ffffff;
  --text: #1a1a2e;
  --muted: #8892a4;
  --border: #e2e8f0;
  --accent: #667eea;
  --radius: 14px;
}

body {
  background: var(--bg);
  font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
  color: white;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}
.header-title { font-size: 15px; font-weight: 700; }
.header-sub   { font-size: 11px; opacity: 0.55; margin-top: 2px; }

.progress-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 110px; }
.progress-text { font-size: 12px; opacity: 0.7; }
.progress-bar-outer { width: 110px; height: 6px; background: rgba(255,255,255,0.18); border-radius: 99px; overflow: hidden; }
.progress-bar-inner { height: 100%; background: linear-gradient(90deg,#667eea,#a78bfa); border-radius: 99px; transition: width 0.4s ease; width: 0%; }

/* ── Container ── */
.container { max-width: 680px; margin: 0 auto; padding: 0 14px 60px; }

/* ── Instructions ── */
.instructions {
  background: white;
  border-left: 4px solid var(--accent);
  margin: 20px 0 14px;
  padding: 16px 20px;
  border-radius: 0 10px 10px 0;
  font-size: 15px;
  color: #444;
  line-height: 1.8;
}
.instructions strong { color: var(--text); }

/* ── Question card ── */
.q-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  margin-bottom: 10px;
  padding: 16px;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.q-card.complete {
  border-color: var(--s);
  box-shadow: 0 0 0 1px rgba(39,174,96,0.12);
}

.q-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.q-num    { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.3px; }
.q-right  { display: flex; align-items: center; gap: 10px; }
.q-status { font-size: 12px; color: var(--muted); transition: color 0.3s; }
.q-card.complete .q-status { color: var(--s); font-weight: 700; }

.btn-reset {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 11px;
  padding: 3px 10px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.btn-reset:hover { border-color: #aaa; color: var(--text); }

/* ── Slots row ── */
/* 使用兩列 grid：第一列放標籤，第二列放格子，確保完全對齊 */
.slots-area {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: auto auto;
  gap: 6px 8px;
  margin-bottom: 10px;
}

.slot-label {
  font-size: 12px;
  font-weight: 800;
  color: var(--muted);
  text-align: center;
  line-height: 1.3;
  /* 固定高度確保四個標籤高度一致，格子才會對齊 */
  height: 34px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 2px;
}
.slot-label.first { color: #764ba2; }
.slot-label.last  { color: #bbb; }
.slot-label span  { font-size: 10px; font-weight: 500; display: block; }

.slot {
  width: 100%;
  min-height: 52px;
  border-radius: 10px;
  border: 2px dashed #d1d9e8;
  background: #f8f9ff;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.slot.filled {
  border: 2px solid var(--accent);
  background: linear-gradient(135deg,#667eea12,#764ba210);
  cursor: pointer;
}
.slot.filled:hover {
  border-color: #E74C3C;
  background: #fff0f0;
}
.slot.filled:hover::after {
  content: '×';
  position: absolute;
  top: 3px;
  right: 6px;
  font-size: 13px;
  color: #E74C3C;
  font-weight: 900;
  line-height: 1;
}

/* Chip inside slot */
.chip-placed {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  text-align: center;
  line-height: 1.3;
  padding: 4px;
  pointer-events: none;
  user-select: none;
}

/* ── Pool area ── */
.pool-label {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 6px;
  font-weight: 600;
}

.pool {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  min-height: 44px;
}

.chip-pool {
  background: linear-gradient(135deg,#667eea18,#764ba212);
  border: 1.5px solid #667eea50;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  user-select: none;
  transition: transform 0.12s, box-shadow 0.12s, background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.chip-pool:hover, .chip-pool:active {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 4px 14px rgba(102,126,234,0.28);
  border-color: var(--accent);
  background: linear-gradient(135deg,#667eea28,#764ba220);
}

.pool-empty-hint {
  font-size: 12px;
  color: #aaa;
  font-style: italic;
  align-self: center;
}

/* ── (slot-wrap removed; using flat grid now) ── */

/* ── Score divider ── */
.score-hint {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 8px;
}
.score-hint-line { flex: 1; height: 1px; background: linear-gradient(90deg,#764ba240,transparent); }
.score-hint-line.right { background: linear-gradient(270deg,#ccc40,transparent); }
.score-hint-text { font-size: 11px; color: #aaa; white-space: nowrap; }

/* ── Submit ── */
.submit-wrap { text-align: center; margin-top: 28px; }
.btn-submit {
  background: linear-gradient(135deg,#667eea,#764ba2);
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  padding: 15px 44px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(102,126,234,0.4);
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
  touch-action: manipulation;
}
.btn-submit:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(102,126,234,0.5); }
.btn-submit:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.incomplete-note { color: var(--d); font-size: 13px; margin-top: 10px; min-height: 20px; }

/* ── Results overlay ── */
.results-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,25,50,0.92);
  z-index: 200;
  overflow-y: auto;
  padding: 32px 16px;
  backdrop-filter: blur(8px);
}
.results-overlay.show { display: flex; align-items: flex-start; justify-content: center; }

.results-box {
  background: white;
  border-radius: 24px;
  padding: 32px 28px;
  width: 100%;
  max-width: 540px;
  margin: auto;
  text-align: center;
}
.results-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
.results-sub   { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

.score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }

.score-block {
  border-radius: 16px;
  padding: 18px 12px;
  color: white;
  position: relative;
  overflow: hidden;
}
.score-block.dominant::after {
  content: '★ 最高';
  position: absolute; top: 8px; right: 9px;
  font-size: 10px; font-weight: 700;
  background: rgba(255,255,255,0.25);
  border-radius: 99px; padding: 2px 7px;
}
.score-block .type-letter { font-size: 38px; font-weight: 900; line-height: 1; }
.score-block .type-name   { font-size: 12px; font-weight: 600; opacity: 0.85; margin: 3px 0 8px; }
.score-block .type-score  { font-size: 34px; font-weight: 900; line-height: 1; }
.score-block .type-max    { font-size: 11px; opacity: 0.6; margin-top: 2px; }
.score-block .type-traits { font-size: 11px; opacity: 0.8; margin-top: 8px; line-height: 1.5; }

.bar-chart { margin: 4px 0 24px; }
.bar-row   { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-label { width: 22px; font-weight: 800; font-size: 14px; text-align: right; flex-shrink: 0; }
.bar-track { flex: 1; background: #f0f0f0; border-radius: 99px; height: 14px; overflow: hidden; }
.bar-fill  { height: 100%; border-radius: 99px; transition: width 1s ease; }
.bar-val   { width: 26px; font-size: 13px; font-weight: 700; text-align: left; flex-shrink: 0; }

.btn-download {
  background: linear-gradient(135deg,#667eea,#764ba2);
  color: white; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 700;
  padding: 13px 32px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(102,126,234,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
  margin-bottom: 12px; touch-action: manipulation;
}
.btn-download:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(102,126,234,0.5); }
.btn-redo {
  display: block; margin: 0 auto;
  background: none; border: 1.5px solid #ddd;
  color: var(--muted); border-radius: 10px;
  font-size: 13px; padding: 8px 20px; cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.btn-redo:hover { border-color: #aaa; color: var(--text); }

@media (max-width: 440px) {
  .chip-placed  { font-size: 11px; }
  .chip-pool    { font-size: 12px; padding: 9px 11px; }
  .slot-label   { font-size: 10px; }
  .results-box  { padding: 22px 16px; }
  .score-block .type-letter { font-size: 30px; }
  .score-block .type-score  { font-size: 28px; }
}
</style>
</head>
<body>

<script>if (!sessionStorage.getItem('disc_auth')) window.location.href = 'index.html';</script>

<!-- Header -->
<div class="header">
  <div>
    <div class="header-title">DISC 個性人際關係問卷</div>
    <div class="header-sub">Relational Style Assessment</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-text" id="progress-text">0 / 12 完成</div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progress-bar"></div>
    </div>
  </div>
</div>

<div class="container">
  <div class="instructions">
    <strong>說明：</strong>請依照您的<strong>直覺</strong>作答，沒有對或錯。<br>
    <strong>作答方式：</strong>每題有 4 個詞，<strong>依序點選</strong>放入分數格——第一個點的最像您（4分），最後點的最不像您（1分）。點已放入的詞可取消。
  </div>

  <div id="questions-container"></div>

  <div class="submit-wrap">
    <button class="btn-submit" id="submit-btn" onclick="submitSurvey()">查看我的 DISC 結果 →</button>
    <div class="incomplete-note" id="incomplete-note"></div>
  </div>
</div>

<!-- Results Overlay -->
<div class="results-overlay" id="results-overlay">
  <div class="results-box">
    <div class="results-title">🎉 我的 DISC 結果</div>
    <div class="results-sub">四個象限加總 = 120 分</div>
    <div class="score-grid" id="score-grid"></div>
    <div class="bar-chart" id="bar-chart"></div>
    <button class="btn-download" onclick="downloadImage()">⬇ 下載結果圖片</button>
    <button class="btn-redo" onclick="location.reload()">重新作答</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  題目資料（12列 × 4欄：D, I, S, C）
// ══════════════════════════════════════════
const QUESTIONS = [
  { D:'強力的',     I:'朝氣蓬勃的', S:'中庸的',     C:'老練的'     },
  { D:'積極的',     I:'情緒化的',   S:'隨和的',     C:'一致的'     },
  { D:'直接了當的', I:'表情豐富的', S:'和藹可親的', C:'精確的'     },
  { D:'堅韌的',     I:'以人為本的', S:'溫和的',     C:'完美主義者' },
  { D:'膽大的',     I:'衝動的',     S:'親切的',     C:'謹慎的'     },
  { D:'競爭的',     I:'情感豐富的', S:'支持的',     C:'準確的'     },
  { D:'冒險者',     I:'健談的',     S:'輕鬆的',     C:'確實的'     },
  { D:'好議論的',   I:'喜愛有趣的', S:'耐心的',     C:'邏輯的'     },
  { D:'勇敢的',     I:'不做作的',   S:'穩定的',     C:'組織性的'   },
  { D:'負責',       I:'樂觀的',     S:'溫和的',     C:'周全的'     },
  { D:'率直的',     I:'興高采烈的', S:'忠心的',     C:'嚴肅的'     },
  { D:'獨立的',     I:'狂熱的',     S:'好的傾聽者', C:'高標準'     },
];

const TYPE_META = {
  D: { name:'主導型', color:'#E74C3C', traits:'果決・目標導向\n直接・喜歡掌控' },
  I: { name:'影響型', color:'#F39C12', traits:'熱情・樂觀\n善溝通・有感染力' },
  S: { name:'穩健型', color:'#27AE60', traits:'耐心・可靠\n善傾聽・重視關係' },
  C: { name:'謹慎型', color:'#2980B9', traits:'精確・分析\n高標準・系統思考' },
};

const TYPES = ['D','I','S','C'];

// ══════════════════════════════════════════
//  狀態：rowState[i].slots = [type|null × 4]
//  pos 0 = 4分（最像我）… pos 3 = 1分
// ══════════════════════════════════════════
const rowState = QUESTIONS.map(() => ({ slots: [null, null, null, null] }));

// 每列展示順序打亂（避免學員看出欄位規律）
const rowOrder = QUESTIONS.map(() => shuffle([...TYPES]));

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ══════════════════════════════════════════
//  建立題目 HTML 骨架
// ══════════════════════════════════════════
const container = document.getElementById('questions-container');

QUESTIONS.forEach((_, rowIdx) => {
  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = `card-${rowIdx}`;
  card.innerHTML = `
    <div class="q-header">
      <span class="q-num">第 ${rowIdx + 1} 題</span>
      <div class="q-right">
        <span class="q-status" id="status-${rowIdx}">點選詞語放入分數格</span>
        <button class="btn-reset" onclick="resetRow(${rowIdx})">重設</button>
      </div>
    </div>

    <div class="slots-area" id="slots-${rowIdx}">
      <!-- 第一列：標籤 -->
      <div class="slot-label first">4<span>最像我</span></div>
      <div class="slot-label">3</div>
      <div class="slot-label">2</div>
      <div class="slot-label last">1<span>最不像我</span></div>
      <!-- 第二列：格子 -->
      <div class="slot" id="slot-${rowIdx}-0" onclick="slotClick(${rowIdx},0)"></div>
      <div class="slot" id="slot-${rowIdx}-1" onclick="slotClick(${rowIdx},1)"></div>
      <div class="slot" id="slot-${rowIdx}-2" onclick="slotClick(${rowIdx},2)"></div>
      <div class="slot" id="slot-${rowIdx}-3" onclick="slotClick(${rowIdx},3)"></div>
    </div>

    <div class="pool-label">待選詞：</div>
    <div class="pool" id="pool-${rowIdx}"></div>
  `;
  container.appendChild(card);
});

// 初始渲染
QUESTIONS.forEach((_, i) => renderRow(i));

// ══════════════════════════════════════════
//  操作函式
// ══════════════════════════════════════════
function placeChip(rowIdx, type) {
  const slots = rowState[rowIdx].slots;
  const nextEmpty = slots.findIndex(s => s === null);
  if (nextEmpty === -1) return;
  slots[nextEmpty] = type;
  renderRow(rowIdx);
  updateProgress();
}

function slotClick(rowIdx, pos) {
  if (!rowState[rowIdx].slots[pos]) return; // 空格不處理
  rowState[rowIdx].slots[pos] = null;
  renderRow(rowIdx);
  updateProgress();
}

function resetRow(rowIdx) {
  rowState[rowIdx].slots = [null, null, null, null];
  renderRow(rowIdx);
  updateProgress();
}

// ══════════════════════════════════════════
//  渲染單列
// ══════════════════════════════════════════
function renderRow(rowIdx) {
  const q     = QUESTIONS[rowIdx];
  const slots = rowState[rowIdx].slots;
  const placed = new Set(slots.filter(Boolean));
  const isComplete = placed.size === 4;

  // 卡片狀態
  const card = document.getElementById(`card-${rowIdx}`);
  card.className = 'q-card' + (isComplete ? ' complete' : '');

  // 狀態文字
  const remaining = 4 - placed.size;
  document.getElementById(`status-${rowIdx}`).textContent =
    isComplete ? '✓ 完成' : `還剩 ${remaining} 個詞`;

  // 插槽
  for (let pos = 0; pos < 4; pos++) {
    const slotEl = document.getElementById(`slot-${rowIdx}-${pos}`);
    const type = slots[pos];
    if (type) {
      slotEl.className = 'slot filled';
      slotEl.innerHTML = `<div class="chip-placed">${q[type]}</div>`;
    } else {
      slotEl.className = 'slot';
      slotEl.innerHTML = '';
    }
  }

  // 待選詞（依打亂順序顯示，跳過已放置的）
  const poolEl = document.getElementById(`pool-${rowIdx}`);
  const poolTypes = rowOrder[rowIdx].filter(t => !placed.has(t));
  if (poolTypes.length === 0) {
    poolEl.innerHTML = '<span class="pool-empty-hint">所有詞已放入，點分數格可取消</span>';
  } else {
    poolEl.innerHTML = poolTypes.map(type =>
      `<div class="chip-pool" onclick="placeChip(${rowIdx},'${type}')">${q[type]}</div>`
    ).join('');
  }
}

// ══════════════════════════════════════════
//  進度條
// ══════════════════════════════════════════
function updateProgress() {
  const done = rowState.filter(r => r.slots.every(s => s !== null)).length;
  document.getElementById('progress-text').textContent = `${done} / 12 完成`;
  document.getElementById('progress-bar').style.width = `${(done / 12) * 100}%`;
}

// ══════════════════════════════════════════
//  計分（pos 0=4分 … pos 3=1分）
// ══════════════════════════════════════════
function calculateScores() {
  const scores = { D:0, I:0, S:0, C:0 };
  rowState.forEach(row => {
    row.slots.forEach((type, pos) => {
      if (type) scores[type] += (4 - pos);
    });
  });
  return scores;
}

// ══════════════════════════════════════════
//  提交
// ══════════════════════════════════════════
function submitSurvey() {
  const incomplete = rowState.findIndex(r => r.slots.some(s => s === null));
  if (incomplete !== -1) {
    document.getElementById('incomplete-note').textContent =
      `⚠ 第 ${incomplete + 1} 題尚未完成，請將所有詞放入分數格`;
    document.getElementById(`card-${incomplete}`)
      .scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  const scores = calculateScores();
  const total = Object.values(scores).reduce((a, b) => a + b, 0);
  if (total !== 120) {
    document.getElementById('incomplete-note').textContent =
      `⚠ 計分異常（總分 ${total}，應為 120），請重新整理頁面。`;
    return;
  }

  document.getElementById('incomplete-note').textContent = '';
  renderResults(scores);
}

// ══════════════════════════════════════════
//  結果頁
// ══════════════════════════════════════════
function renderResults(scores) {
  const maxScore = Math.max(...TYPES.map(t => scores[t]));

  // Score blocks
  const grid = document.getElementById('score-grid');
  grid.innerHTML = '';
  TYPES.forEach(type => {
    const meta = TYPE_META[type];
    const isDom = scores[type] === maxScore;
    const block = document.createElement('div');
    block.className = 'score-block' + (isDom ? ' dominant' : '');
    block.style.background = `linear-gradient(135deg,${meta.color}ee,${meta.color}99)`;
    block.innerHTML = `
      <div class="type-letter">${type}</div>
      <div class="type-name">${meta.name}</div>
      <div class="type-score">${scores[type]}</div>
      <div class="type-max">/ 48 分</div>
      <div class="type-traits">${meta.traits}</div>
    `;
    grid.appendChild(block);
  });

  // Bar chart
  const chart = document.getElementById('bar-chart');
  chart.innerHTML = TYPES.map(type => {
    const meta = TYPE_META[type];
    const pct = (scores[type] / 48 * 100).toFixed(1);
    return `
      <div class="bar-row">
        <div class="bar-label" style="color:${meta.color}">${type}</div>
        <div class="bar-track">
          <div class="bar-fill" style="background:${meta.color};width:0%" data-pct="${pct}"></div>
        </div>
        <div class="bar-val">${scores[type]}</div>
      </div>`;
  }).join('');

  document.getElementById('results-overlay').classList.add('show');
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(b => { b.style.width = b.dataset.pct + '%'; });
  }, 80);

  window._discScores = scores;
}

// ══════════════════════════════════════════
//  Canvas 結果圖片
// ══════════════════════════════════════════
function downloadImage() {
  const scores = window._discScores;
  if (!scores) return;

  const W = 900, H = 580;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // 背景
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#1a1a2e');
  bgGrad.addColorStop(1, '#0f3460');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // 標題列
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.fillRect(0, 0, W, 70);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 26px "PingFang TC","Microsoft JhengHei",Arial';
  ctx.textAlign = 'center';
  ctx.fillText('DISC 個性人際關係結果', W / 2, 43);
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '13px "PingFang TC","Microsoft JhengHei",Arial';
  ctx.fillText('Relational Style Assessment', W / 2, 62);

  // 四個象限方塊
  const colors  = { D:'#E74C3C', I:'#F39C12', S:'#27AE60', C:'#2980B9' };
  const names   = { D:'主導型',   I:'影響型',   S:'穩健型',   C:'謹慎型'  };
  const traits  = { D:['果決','目標導向','直接'], I:['熱情','樂觀','善溝通'], S:['耐心','可靠','善傾聽'], C:['精確','分析','高標準'] };
  const maxScore = Math.max(...TYPES.map(t => scores[t]));

  const bW = 188, bH = 198, gap = 14;
  const startX = (W - (bW * 4 + gap * 3)) / 2;
  const startY = 85;

  TYPES.forEach((type, i) => {
    const x = startX + i * (bW + gap), y = startY;
    const isDom = scores[type] === maxScore;

    rrect(ctx, x, y, bW, bH, 15);
    const g = ctx.createLinearGradient(x, y, x + bW, y + bH);
    g.addColorStop(0, colors[type] + 'ee');
    g.addColorStop(1, colors[type] + '88');
    ctx.fillStyle = g;
    ctx.fill();

    if (isDom) {
      ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 2.5; ctx.stroke();
      rrect(ctx, x + bW - 62, y + 9, 54, 20, 10);
      ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px "PingFang TC","Microsoft JhengHei",Arial';
      ctx.textAlign = 'center';
      ctx.fillText('★ 最高', x + bW - 35, y + 23);
    }

    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.font = 'bold 70px "Helvetica Neue",Arial';
    ctx.fillText(type, x + bW / 2, y + 75);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 70px "Helvetica Neue",Arial';
    ctx.fillText(type, x + bW / 2, y + 73);

    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.font = 'bold 13px "PingFang TC","Microsoft JhengHei",Arial';
    ctx.fillText(names[type], x + bW / 2, y + 94);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px "Helvetica Neue",Arial';
    ctx.fillText(scores[type], x + bW / 2, y + 137);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '12px "Helvetica Neue",Arial';
    ctx.fillText('/ 48', x + bW / 2, y + 154);

    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.font = '12px "PingFang TC","Microsoft JhengHei",Arial';
    ctx.fillText(traits[type].join(' · '), x + bW / 2, y + 180);
  });

  // Bar chart
  const barY = startY + bH + 26;
  const barH = 17;
  const barX = 68, barW = W - 136;

  TYPES.forEach((type, i) => {
    const y = barY + i * (barH + 11);
    const pct = scores[type] / 48;

    rrect(ctx, barX, y, barW, barH, barH / 2);
    ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fill();

    rrect(ctx, barX, y, barW * pct, barH, barH / 2);
    ctx.fillStyle = colors[type]; ctx.fill();

    ctx.fillStyle = colors[type];
    ctx.font = 'bold 13px "Helvetica Neue",Arial';
    ctx.textAlign = 'right';
    ctx.fillText(type, barX - 9, y + barH - 3);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px "Helvetica Neue",Arial';
    ctx.textAlign = 'left';
    ctx.fillText(scores[type], barX + barW * pct + 7, y + barH - 3);
  });

  // Footer
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.font = '11px "PingFang TC","Microsoft JhengHei",Arial';
  ctx.textAlign = 'center';
  ctx.fillText('DISC Relational Style Assessment', W / 2, H - 12);

  const link = document.createElement('a');
  link.download = 'DISC_我的結果.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}
</script>
