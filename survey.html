<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISC 個性問卷</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --d: #E74C3C;
  --i: #F39C12;
  --s: #27AE60;
  --c: #2980B9;
  --bg: #f4f6fb;
  --card: #ffffff;
  --text: #1a1a2e;
  --muted: #8892a4;
  --border: #e2e8f0;
  --radius: 14px;
}

body {
  background: var(--bg);
  font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  color: var(--text);
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%);
  color: white;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}

.header-title { font-size: 16px; font-weight: 700; }
.header-sub { font-size: 12px; opacity: 0.6; margin-top: 2px; }

.progress-wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  min-width: 120px;
}

.progress-text { font-size: 12px; opacity: 0.7; }

.progress-bar-outer {
  width: 120px;
  height: 6px;
  background: rgba(255,255,255,0.2);
  border-radius: 99px;
  overflow: hidden;
}

.progress-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #764ba2);
  border-radius: 99px;
  transition: width 0.4s ease;
  width: 0%;
}

/* ── Instructions ── */
.instructions {
  background: white;
  border-left: 4px solid #667eea;
  margin: 24px auto;
  max-width: 780px;
  padding: 18px 22px;
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 14px;
  color: #444;
  line-height: 1.7;
}
.instructions strong { color: var(--text); }

/* ── Main container ── */
.container {
  max-width: 780px;
  margin: 0 auto;
  padding: 0 16px 48px;
}

/* ── Question card ── */
.q-card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  margin-bottom: 12px;
  padding: 18px 20px;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.q-card.complete {
  border-color: #27AE60;
  box-shadow: 0 0 0 1px rgba(39,174,96,0.15);
}

.q-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.q-num {
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.q-status {
  font-size: 13px;
  color: var(--muted);
  transition: color 0.3s;
}
.q-card.complete .q-status { color: #27AE60; }

/* ── Score labels ── */
.score-labels {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}

.score-label {
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  padding: 2px 0;
}
.score-label:first-child { color: #764ba2; }
.score-label:last-child { color: #aaa; }

/* ── Sortable chips row ── */
.chips-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  min-height: 52px;
}

.chip {
  background: linear-gradient(135deg, #667eea15, #764ba215);
  border: 1.5px solid #667eea40;
  border-radius: 10px;
  padding: 10px 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  cursor: grab;
  user-select: none;
  transition: transform 0.15s, box-shadow 0.15s, border-color 0.2s, background 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1.3;
}

.chip:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(102,126,234,0.25);
  border-color: #667eea80;
}

.chip.sortable-ghost {
  opacity: 0.3;
  background: #667eea20;
}

.chip.sortable-chosen {
  cursor: grabbing;
  transform: scale(1.04);
  box-shadow: 0 8px 24px rgba(102,126,234,0.35);
  border-color: #667eea;
  background: linear-gradient(135deg, #667eea25, #764ba225);
}

/* Chip score-position colour hints (assigned after each sort) */
.chip[data-pos="0"] { border-color: #764ba260; background: linear-gradient(135deg,#764ba215,#667eea10); }
.chip[data-pos="3"] { border-color: #ccc; background: #fafafa; color: #999; }

/* ── Submit button ── */
.submit-wrap {
  text-align: center;
  margin-top: 32px;
}

.btn-submit {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 17px;
  font-weight: 700;
  padding: 16px 48px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(102,126,234,0.4);
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
}
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(102,126,234,0.5); }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.incomplete-note {
  color: #E74C3C;
  font-size: 13px;
  margin-top: 10px;
  min-height: 20px;
}

/* ── Results overlay ── */
.results-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(15,25,50,0.92);
  z-index: 200;
  overflow-y: auto;
  padding: 40px 20px;
  backdrop-filter: blur(8px);
}

.results-overlay.show { display: flex; align-items: flex-start; justify-content: center; }

.results-box {
  background: white;
  border-radius: 24px;
  padding: 36px 32px;
  width: 100%;
  max-width: 560px;
  margin: auto;
  text-align: center;
}

.results-title {
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 6px;
}
.results-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

/* 4 score blocks */
.score-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

.score-block {
  border-radius: 16px;
  padding: 20px 14px;
  text-align: center;
  color: white;
  position: relative;
  overflow: hidden;
}

.score-block.dominant::after {
  content: '★ 最高';
  position: absolute;
  top: 8px;
  right: 10px;
  font-size: 10px;
  font-weight: 700;
  background: rgba(255,255,255,0.25);
  border-radius: 99px;
  padding: 2px 7px;
}

.score-block .type-letter {
  font-size: 42px;
  font-weight: 900;
  line-height: 1;
  opacity: 0.9;
}
.score-block .type-name { font-size: 13px; font-weight: 600; opacity: 0.85; margin: 4px 0 8px; }
.score-block .type-score { font-size: 36px; font-weight: 900; line-height: 1; }
.score-block .type-max { font-size: 12px; opacity: 0.65; margin-top: 2px; }
.score-block .type-traits { font-size: 11px; opacity: 0.8; margin-top: 8px; line-height: 1.5; }

/* bar chart */
.bar-chart { margin: 4px 0 28px; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-label { width: 24px; font-weight: 800; font-size: 14px; text-align: right; flex-shrink: 0; }
.bar-track { flex: 1; background: #f0f0f0; border-radius: 99px; height: 14px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width 1s ease; }
.bar-val { width: 28px; font-size: 13px; font-weight: 700; text-align: left; flex-shrink: 0; }

/* download button */
.btn-download {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  padding: 13px 36px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(102,126,234,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
  margin-bottom: 12px;
}
.btn-download:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(102,126,234,0.5); }

.btn-redo {
  display: block;
  margin: 0 auto;
  background: none;
  border: 1.5px solid #ddd;
  color: var(--muted);
  border-radius: 10px;
  font-size: 13px;
  padding: 8px 20px;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.btn-redo:hover { border-color: #aaa; color: var(--text); }

@media (max-width: 480px) {
  .chip { font-size: 11px; padding: 8px 4px; }
  .score-label { font-size: 10px; }
  .results-box { padding: 24px 18px; }
  .score-block .type-letter { font-size: 32px; }
  .score-block .type-score { font-size: 28px; }
}
</style>
</head>
<body>

<!-- Auth guard -->
<script>
  if (!sessionStorage.getItem('disc_auth')) {
    window.location.href = 'index.html';
  }
</script>

<!-- Header -->
<div class="header">
  <div>
    <div class="header-title">DISC 個性人際關係問卷</div>
    <div class="header-sub">Relational Style Assessment</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-text" id="progress-text">0 / 12 完成</div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progress-bar"></div>
    </div>
  </div>
</div>

<!-- Instructions -->
<div class="container">
  <div class="instructions">
    <strong>說明：</strong>請依照您的<strong>直覺反應</strong>作答，沒有對或錯的答案。<br>
    <strong>作答方式：</strong>每題有 4 個詞，請將它們<strong>拖曳排序</strong>——最左邊代表<strong>最像您（4分）</strong>，最右邊代表<strong>最不像您（1分）</strong>。每題的 1、2、3、4 分各用一次。
  </div>

  <!-- Questions will be injected here -->
  <div id="questions-container"></div>

  <div class="submit-wrap">
    <button class="btn-submit" id="submit-btn" onclick="submitSurvey()">查看我的 DISC 結果 →</button>
    <div class="incomplete-note" id="incomplete-note"></div>
  </div>
</div>

<!-- Results Overlay -->
<div class="results-overlay" id="results-overlay">
  <div class="results-box">
    <div class="results-title">🎉 我的 DISC 結果</div>
    <div class="results-sub">四個象限加總 = 120 分</div>

    <div class="score-grid" id="score-grid"></div>
    <div class="bar-chart" id="bar-chart"></div>

    <button class="btn-download" onclick="downloadImage()">⬇ 下載結果圖片</button>
    <button class="btn-redo" onclick="location.reload()">重新作答</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  DISC 題目資料（12列 × 4欄：D, I, S, C）
// ════════════════════════════════════════════
const QUESTIONS = [
  { D:'強力的',     I:'朝氣蓬勃的', S:'中庸的',     C:'老練的'     },
  { D:'積極的',     I:'情緒化的',   S:'隨和的',     C:'一致的'     },
  { D:'直接了當的', I:'表情豐富的', S:'和藹可親的', C:'精確的'     },
  { D:'堅韌的',     I:'以人為本的', S:'溫和的',     C:'完美主義者' },
  { D:'膽大的',     I:'衝動的',     S:'親切的',     C:'謹慎的'     },
  { D:'競爭的',     I:'情感豐富的', S:'支持的',     C:'準確的'     },
  { D:'冒險者',     I:'健談的',     S:'輕鬆的',     C:'確實的'     },
  { D:'好議論的',   I:'喜愛有趣的', S:'耐心的',     C:'邏輯的'     },
  { D:'勇敢的',     I:'不做作的',   S:'穩定的',     C:'組織性的'   },
  { D:'負責',       I:'樂觀的',     S:'溫和的',     C:'周全的'     },
  { D:'率直的',     I:'興高采烈的', S:'忠心的',     C:'嚴肅的'     },
  { D:'獨立的',     I:'狂熱的',     S:'好的傾聽者', C:'高標準'     },
];

const TYPE_META = {
  D: { name:'主導型', color:'#E74C3C', traits:'果決・目標導向\n直接・喜歡掌控' },
  I: { name:'影響型', color:'#F39C12', traits:'熱情・樂觀\n善溝通・有感染力' },
  S: { name:'穩健型', color:'#27AE60', traits:'耐心・可靠\n善傾聽・重視關係' },
  C: { name:'謹慎型', color:'#2980B9', traits:'精確・分析\n高標準・系統思考' },
};

// ════════════════════════════════════════════
//  建立問卷 UI
// ════════════════════════════════════════════
const container = document.getElementById('questions-container');

QUESTIONS.forEach((q, rowIdx) => {
  // 打亂每列詞的順序，避免學員看出欄位規律
  const words = Object.entries(q); // [['D','強力的'], ...]
  shuffle(words);

  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = `card-${rowIdx}`;

  card.innerHTML = `
    <div class="q-header">
      <span class="q-num">第 ${rowIdx + 1} 題</span>
      <span class="q-status" id="status-${rowIdx}">拖曳排序</span>
    </div>
    <div class="score-labels">
      <div class="score-label">4　最像我</div>
      <div class="score-label">3</div>
      <div class="score-label">2</div>
      <div class="score-label">1　最不像我</div>
    </div>
    <div class="chips-row" id="row-${rowIdx}">
      ${words.map(([type, word]) =>
        `<div class="chip" data-type="${type}">${word}</div>`
      ).join('')}
    </div>
  `;
  container.appendChild(card);

  // 初始化 Sortable（含觸控支援）
  Sortable.create(document.getElementById(`row-${rowIdx}`), {
    animation: 180,
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    onEnd: () => updateRowStatus(rowIdx),
  });

  // 初始 pos 標記
  updateRowStatus(rowIdx);
});

// ════════════════════════════════════════════
//  更新進度
// ════════════════════════════════════════════
function updateRowStatus(rowIdx) {
  // 每列永遠都是 4 個詞，所以直接標記完成
  const card = document.getElementById(`card-${rowIdx}`);
  const statusEl = document.getElementById(`status-${rowIdx}`);
  card.classList.add('complete');
  statusEl.textContent = '✓ 已排序';

  // 更新位置標記（顏色提示）
  const chips = document.querySelectorAll(`#row-${rowIdx} .chip`);
  chips.forEach((chip, i) => chip.setAttribute('data-pos', i));

  updateProgress();
}

function updateProgress() {
  // 所有題目因初始就已有詞，視為「任何排序皆有效」
  // 只需確認每列都有 4 個 chip（Sortable 保證不會消失）
  const done = QUESTIONS.length; // 永遠全部完成（學員只需排序，不需拖入空格）
  document.getElementById('progress-text').textContent = `${done} / 12 完成`;
  document.getElementById('progress-bar').style.width = `${(done/12)*100}%`;
}

// 初始化就更新一次
updateProgress();

// ════════════════════════════════════════════
//  計分
// ════════════════════════════════════════════
function calculateScores() {
  const scores = { D:0, I:0, S:0, C:0 };
  for (let rowIdx = 0; rowIdx < 12; rowIdx++) {
    const chips = document.querySelectorAll(`#row-${rowIdx} .chip`);
    // 位置 0 = 4分（最像我）… 位置 3 = 1分（最不像我）
    chips.forEach((chip, pos) => {
      const score = 4 - pos;
      scores[chip.dataset.type] += score;
    });
  }
  return scores;
}

// ════════════════════════════════════════════
//  提交 & 顯示結果
// ════════════════════════════════════════════
function submitSurvey() {
  const scores = calculateScores();
  const total = Object.values(scores).reduce((a,b) => a+b, 0);

  if (total !== 120) {
    document.getElementById('incomplete-note').textContent =
      `⚠ 計分異常（目前總分 ${total}，應為 120），請重新整理頁面再試。`;
    return;
  }

  document.getElementById('incomplete-note').textContent = '';
  renderResults(scores);
}

function renderResults(scores) {
  // 找最高分
  const maxScore = Math.max(...Object.values(scores));
  const order = ['D','I','S','C'];

  // Score blocks
  const grid = document.getElementById('score-grid');
  grid.innerHTML = '';
  order.forEach(type => {
    const meta = TYPE_META[type];
    const isDominant = scores[type] === maxScore;
    const block = document.createElement('div');
    block.className = 'score-block' + (isDominant ? ' dominant' : '');
    block.style.background = `linear-gradient(135deg, ${meta.color}dd, ${meta.color}aa)`;
    block.innerHTML = `
      <div class="type-letter">${type}</div>
      <div class="type-name">${meta.name}</div>
      <div class="type-score">${scores[type]}</div>
      <div class="type-max">/ 48 分</div>
      <div class="type-traits">${meta.traits}</div>
    `;
    grid.appendChild(block);
  });

  // Bar chart
  const chart = document.getElementById('bar-chart');
  chart.innerHTML = '';
  order.forEach(type => {
    const meta = TYPE_META[type];
    const pct = (scores[type] / 48) * 100;
    chart.innerHTML += `
      <div class="bar-row">
        <div class="bar-label" style="color:${meta.color}">${type}</div>
        <div class="bar-track">
          <div class="bar-fill" style="background:${meta.color}; width:0%"
               data-pct="${pct.toFixed(1)}"></div>
        </div>
        <div class="bar-val">${scores[type]}</div>
      </div>
    `;
  });

  // Show overlay
  document.getElementById('results-overlay').classList.add('show');

  // Animate bars after paint
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.pct + '%';
    });
  }, 100);

  // Store scores for image generation
  window._discScores = scores;
}

// ════════════════════════════════════════════
//  Canvas 結果圖片生成
// ════════════════════════════════════════════
function downloadImage() {
  const scores = window._discScores;
  if (!scores) return;

  const W = 900, H = 580;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // ── 背景 ──
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, '#1a1a2e');
  bgGrad.addColorStop(1, '#0f3460');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // ── 標題 ──
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(0, 0, W, 72);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 26px "PingFang TC", "Microsoft JhengHei", Arial';
  ctx.textAlign = 'center';
  ctx.fillText('DISC 個性人際關係結果', W/2, 44);

  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = '14px "PingFang TC", "Microsoft JhengHei", Arial';
  ctx.fillText('Relational Style Assessment', W/2, 64);

  // ── 四個象限方塊 ──
  const types = ['D','I','S','C'];
  const colors = { D:'#E74C3C', I:'#F39C12', S:'#27AE60', C:'#2980B9' };
  const names  = { D:'主導型', I:'影響型', S:'穩健型', C:'謹慎型' };
  const traits = {
    D:['果決','目標導向','直接'],
    I:['熱情','樂觀','善溝通'],
    S:['耐心','可靠','善傾聽'],
    C:['精確','分析','高標準'],
  };

  const maxScore = Math.max(...types.map(t => scores[t]));
  const blockW = 190, blockH = 200, gap = 16;
  const startX = (W - (blockW*4 + gap*3)) / 2;
  const startY = 90;

  types.forEach((type, i) => {
    const x = startX + i*(blockW+gap);
    const y = startY;
    const isDom = scores[type] === maxScore;

    // Card background
    roundRect(ctx, x, y, blockW, blockH, 16);
    const grad = ctx.createLinearGradient(x, y, x+blockW, y+blockH);
    grad.addColorStop(0, colors[type] + 'ee');
    grad.addColorStop(1, colors[type] + '99');
    ctx.fillStyle = grad;
    ctx.fill();

    // Glow border for dominant
    if (isDom) {
      ctx.strokeStyle = '#ffffff88';
      ctx.lineWidth = 2.5;
      ctx.stroke();
      // Star label
      ctx.fillStyle = 'rgba(255,255,255,0.28)';
      roundRect(ctx, x+blockW-64, y+10, 56, 20, 10);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 11px "PingFang TC","Microsoft JhengHei",Arial';
      ctx.textAlign = 'center';
      ctx.fillText('★ 最高', x+blockW-36, y+24);
    }

    ctx.textAlign = 'center';
    // Letter
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = `bold 72px "Helvetica Neue", Arial`;
    ctx.fillText(type, x+blockW/2, y+76);
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold 72px "Helvetica Neue", Arial`;
    ctx.fillText(type, x+blockW/2, y+74);

    // Type name
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = `bold 14px "PingFang TC","Microsoft JhengHei",Arial`;
    ctx.fillText(names[type], x+blockW/2, y+96);

    // Score
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold 38px "Helvetica Neue", Arial`;
    ctx.fillText(scores[type], x+blockW/2, y+140);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.font = `13px "Helvetica Neue", Arial`;
    ctx.fillText('/ 48', x+blockW/2, y+158);

    // Traits
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.font = `12px "PingFang TC","Microsoft JhengHei",Arial`;
    ctx.fillText(traits[type].join(' · '), x+blockW/2, y+183);
  });

  // ── Bar chart ──
  const barY = startY + blockH + 28;
  const barH = 18;
  const barAreaX = 70, barAreaW = W - 140;

  types.forEach((type, i) => {
    const y = barY + i*(barH+12);
    const pct = scores[type]/48;
    const fillW = barAreaW * pct;

    // Track
    roundRect(ctx, barAreaX, y, barAreaW, barH, barH/2);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fill();

    // Fill
    roundRect(ctx, barAreaX, y, fillW, barH, barH/2);
    ctx.fillStyle = colors[type];
    ctx.fill();

    // Label
    ctx.fillStyle = colors[type];
    ctx.font = `bold 14px "Helvetica Neue", Arial`;
    ctx.textAlign = 'right';
    ctx.fillText(type, barAreaX-10, y+barH-3);

    // Value
    ctx.fillStyle = '#ffffff';
    ctx.font = `bold 13px "Helvetica Neue", Arial`;
    ctx.textAlign = 'left';
    ctx.fillText(scores[type], barAreaX+fillW+8, y+barH-3);
  });

  // ── Footer ──
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = `12px "PingFang TC","Microsoft JhengHei",Arial`;
  ctx.textAlign = 'center';
  ctx.fillText('DISC Relational Style Assessment', W/2, H-14);

  // ── Download ──
  const link = document.createElement('a');
  link.download = 'DISC_我的結果.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// Helper: rounded rect path
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r);
  ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h);
  ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r);
  ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// Fisher-Yates shuffle
function shuffle(arr) {
  for (let i = arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
